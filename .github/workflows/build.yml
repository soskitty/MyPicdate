name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        run: |
          SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "sdk.dir=$SDK_ROOT" > local.properties
          SDKMAN=$(find $SDK_ROOT -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -z "$SDKMAN" ]; then
            mkdir -p $SDK_ROOT/cmdline-tools
            cd /tmp
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline-tools.zip
            unzip -q cmdline-tools.zip -d $SDK_ROOT/cmdline-tools
            mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest
            SDKMAN=$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          fi
          yes | "$SDKMAN" --licenses > /dev/null 2>&1 || true
          yes | "$SDKMAN" "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Generate Keystore
        run: |
          rm -f app/picdate.keystore
          keytool -genkey -v -keystore app/picdate.keystore -alias picdate -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=MyPicdate, OU=Dev, O=MyPicdate, L=Beijing, ST=Beijing, C=CN"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyPicdate
          path: app/build/outputs/apk/release/*.apk
